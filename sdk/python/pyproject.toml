[project]
name = "kyoso-agent"
version = "0.1.0"
description = "Python SDK for the kyoso scene-agent surface. Pydantic types generated from the Rust JSON Schema; pluggable Transport for in-process / subprocess / remote use."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT OR Apache-2.0" }
authors = [{ name = "Hector Crean", email = "hectorcrean@gmail.com" }]

dependencies = [
    "pydantic>=2.7",
]

[project.optional-dependencies]
# HTTP / WS transports — not required for in-process or stub use.
http = ["httpx>=0.27"]
# Dev tooling. (Targeting uv 0.4.x which predates PEP 735 dependency-groups;
# move to [dependency-groups] once we bump the uv floor.)
dev = [
    "datamodel-code-generator>=0.25",
    "maturin>=1.7",
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "mypy>=1.10",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/kyoso_agent"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"

[tool.mypy]
python_version = "3.10"
strict = true
files = ["src", "tests"]
